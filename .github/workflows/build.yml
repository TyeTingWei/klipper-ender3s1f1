name: Build Klipper Firmware - Ender 3 S1 F1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential make python3 python3-pip python-is-python3

      - name: Clone Klipper source
        run: git clone https://github.com/Klipper3d/klipper.git --depth 1

      - name: Configure firmware (Ender 3 S1 F1 - STM32F103)
        run: |
          cd klipper
          rm -f .config
          echo "CONFIG_LOW_LEVEL_OPTIONS=y" >> .config
          echo "CONFIG_MACH_STM32=y" >> .config
          echo "CONFIG_MACH_STM32F103=y" >> .config
          echo "CONFIG_CLOCK_REF_8M=y" >> .config
          echo "CONFIG_STM32_SERIAL_USART1=y" >> .config
          echo "CONFIG_STM32_FLASH_START_7000=y" >> .config
          make olddefconfig

      - name: Build firmware
        run: |
          cd klipper
          make -j$(nproc)

      - name: Upload firmware.bin
        uses: actions/upload-artifact@v4
        with:
          name: klipper-ender3s1f1
          path: klipper/out/klipper.bin
