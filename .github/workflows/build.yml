name: Build Klipper Firmware - Ender 3 S1 F1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential

      - name: Clone & build firmware
        run: |
          git clone https://github.com/Klipper3d/klipper.git --depth 1
          cp ender3s1f1.config klipper/.config
          cd klipper
          make olddefconfig V=1
          make -j$(nproc) V=1

      - name: Upload firmware.bin
        uses: actions/upload-artifact@v4
        with:
          name: klipper-ender3s1f1
          path: klipper/out/klipper.bin
